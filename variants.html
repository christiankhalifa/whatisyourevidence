  <script>
    function showTab(letter) {
      const letters = "ABCDEFGHIJK".split("");
      letters.forEach(l => {
        document.getElementById("content-" + l).classList.add("hidden");
        document.getElementById("tab-" + l).classList.remove("active");
      });
      document.getElementById("content-" + letter).classList.remove("hidden");
      document.getElementById("tab-" + letter).classList.add("active");
    }

    // Default view
    showTab("A");
  </script>
